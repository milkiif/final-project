<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="mau image.ico" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="bootstrap-5.3.3-dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #e9ecef;
            display: flex;
            flex-direction: column; /* Added for vertical layout */
            align-items: center; /* Centering items */
            justify-content: center; /* Center vertically */
            height: 100vh; /* Full height */
        }
        h1 {
            text-align: center;
            color: #343a40;
            margin-bottom: 20px;
        }
        form {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
            color: #495057;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #007BFF;
            outline: none;
        }
        .button-container {
            display: flex;
            justify-content: center; /* Center the buttons */
            margin-top: 10px; /* Space above buttons */
        }
        input[type="submit"]{
            background-color: #007BFF; /* Blue for both buttons */
            color: white;
            border: none;
            padding: 12px 20px; /* Increased padding for a more attractive button */
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.3s;
            margin: 0 5px; /* Space between buttons */
        }
        input[type="submit"]:hover, .back-button:hover {
            background-color: #0056b3; /* Darker blue on hover */
            transform: translateY(-2px);
        }
        .icon {
            font-size: 50px;
            color: #007BFF;
            display: block;
            text-align: center;
            margin-bottom: 20px;
        }
        .all {
            margin-top: -110pt;
            margin-left: -14pt;
            margin-right: -14pt;
        }
        .ah {
            margin-left: 300pt;
        }
        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #4CAF50; /* Green */
            font-weight: bold;
            padding: 10px 15px;
            border: 2px solid #4CAF50; /* Green border */
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #4CAF50; /* Green */
            color: white; /* White text on hover */
        }.fas{
margin-top:8pt;
        }
    </style>
</head>
<body class="alladmin">
        
    <div class="all">

        <img src="hrm.png" width="1365pt" height="110pt" style="margin-bottom: 20px;"> <!-- Added margin-bottom for spacing -->
    </div>
    
    <div>
        <i class="fas fa-search icon"></i>
        
        <form action="profil2.php" method="POST">
            <label for="employeeId">ENTER YOUR ID:</label>

            </div>
