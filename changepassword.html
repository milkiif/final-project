<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="icon" href="mau image.ico" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="bootstrap-5.3.3-dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
        }

        .header {
            text-align: center;
            margin-bottom: 20px; /* Space between header and form */
        }

        .header img {
            width: 100%; /* Adjusting the image to fit responsively */
            max-width: 1365px; /* Maintain maximum width */
        /* Maintain aspect ratio */
        }

        .form-container {
            background-color: #ffffff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin: 0 auto; /* Center the form */
            position: relative; /* Position for absolute placement */
           margin-top: 10px; /* Move form up a bit */
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        label {
            display: block;
            margin: 10px 0 5px 20px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"], input[type="password"] {
            width: calc(100% - 40px);
            padding: 10px;
            margin: 0 0 10px 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        input[type="submit"], input[type="reset"] {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px 0 20px;
        }

        input[type="submit"]:hover, input[type="reset"]:hover {
            background-color: #0056b3;
            
        }

        .back-link {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            text-align: center;
        }

        .back-link:hover {
            color: #0056b3;
        }

        .welcome-text {
            font-size: 1.5em; /* Adjust welcome text size */
            margin: 20px 0; /* Spacing above and below */
        }
        .ah {
          
            margin-left: 300pt;
        }
        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #4CAF50; /* Green */
            font-weight: bold;
            padding: 10px 15px;
            border: 2px solid #4CAF50; /* Green border */
            border-radius: 3px;
            transition: background-color 0.3s, color 0.3s;
            width:80pt;
        }
        a:hover {
            background-color: #4CAF50; /* Green */
        }
    </style>
</head>
<body class="alladmin">
        
    <div class="all">
        <h3 class="ah">Welcome to employee page</h3>
        <img src="hrm.png" width="1350pt" height="110pt" style="margin-bottom: 20px;"> <!-- Added margin-bottom for spacing -->
    </div>

    <div class="form-container">
        <form action="changepassword.php" method="POST">
            <h2>Change Password</h2>
            <label for="usernamech">Username:</label>
            <input type="text" id="usernamech" name="username" maxlength="16" placeholder="Enter your username" required>
            
            <label for="password1">Old Password:</label>
            <input type="password" id="password1" name="password1" maxlength="8" placeholder="Enter your current password" required>
            
            <label for="password2">New Password:</label>
            <input type="password" id="password2" name="password2" maxlength="8" placeholder="Enter new password" required>
            
            <div>
                <input type="submit" name="submit" value="Change">
              
            </div>
        </form>
        <a href="employee.html" class="back-link">Back</a>
    </div>
</body>
</html>
