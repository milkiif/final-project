<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Messages</title>
    <link rel="icon" href="mau image.ico" type="image/x-icon"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="mau image.ico" type="image/x-icon"> 
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="bootstrap-5.3.3-dist/css/bootstrap.min.css">
    <style>
         .all {
            margin-top: -14pt;
            margin-left: -14pt;
            margin-right: -14pt;
        }
        .ah{
            margin-left:300pt;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            background-color: #007BFF;
            padding: 15px;
            border-radius: 5px;
        }
        .comment-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
            margin-top:10pt;
        }
        .comment {
            border: 1px solid #007BFF;
            border-radius: 5px;
            background-color: #e9f7ff;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            transition: transform 0.2s;
        }
        .comment:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .comment b {
            color: #007BFF;
        }
        .comment .user-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 30px;
            color: #007BFF;
        }
        .back-button {
            display: block;
            margin: 20px auto;
            padding: 5px 10px; /* Smaller padding for a smaller button */
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px; /* Smaller font size */
            width: 100px; /* Fixed width for the button */
            transition: background-color 0.3s;
        }
        .back-button:hover {
            background-color: #0056b3;
        }
        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #4CAF50; /* Green */
            font-weight: bold;
            padding: 10px 15px;
            border: 2px solid #4CAF50; /* Green border */
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #4CAF50; /* Green */
            color: white; /* White text on hover */
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function fetchcomment() {
            $.ajax({
                url: 'commentfetch.php', // PHP script to fetch messages
                method: 'GET',
                success: function(data) {
                    $('#comment').html(data); // Update the messages div with the fetched data
                }
            });
        }

        // Fetch messages every 5 seconds
        setInterval(fetchcomment, 5000);

        // Fetch messages on page load
        $(document).ready(function() {
            fetchcomment();
        });
    </script>
</head>
<body class="alladmin">
        
    <div class="all">
        <h3 class="ah">Welcome to manager page</h3>
        <img src="hrm.png" width="1365pt" height="110pt">
        <nav class="navbar navbar-expand-lg navbar-light bg-color:green ">
        </nav>
    </div>


<div class="comment-container">
    <h2 style="text-align: center; color: #007BFF;">Available Comments</h2>
    <a href="hr manager.html">Back</a>
    <div id="comment">
       
        <!-- Messages will be displayed here -->
        <div class="comment">
            <i class="fas fa-user user-icon"></i>
            <b>User 1:</b> This is a sample comment from User 1.
        </div>
        <div class="comment">
            <i class="fas fa-user user-icon"></i>
            <b>User 2:</b> This is another comment from User 2.
        </div>
        <!-- More comments will be dynamically loaded here -->
 
    </div>
</div>

</body>
</html>
